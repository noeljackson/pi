name: TS Parity Drift

on:
  schedule:
    - cron: '23 5 * * *'
  workflow_dispatch:
    inputs:
      ts_reference_repo:
        description: 'TypeScript reference repository'
        required: false
        default: 'https://github.com/noeljackson/pi.git'
      ts_reference_ref:
        description: 'TypeScript reference ref to track'
        required: false
        default: 'ts-reference'

permissions:
  contents: read
  issues: write

concurrency:
  group: ts-parity-drift
  cancel-in-progress: false

jobs:
  drift:
    runs-on: ubuntu-latest
    env:
      TS_REFERENCE_REPO: ${{ inputs.ts_reference_repo || 'https://github.com/noeljackson/pi.git' }}
      TS_PARITY_TRACKING_REF: ${{ inputs.ts_reference_ref || 'ts-reference' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check TypeScript parity drift
        id: parity
        continue-on-error: true
        run: make ts-parity-agent

      - name: Upload drift brief
        if: steps.parity.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ts-parity-drift
          path: target/ts-parity-drift

      - name: Report drift issue
        if: steps.parity.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = 'TS parity drift detected';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const briefPath = 'target/ts-parity-drift/brief.md';
            const diffPath = 'target/ts-parity-drift/fixture.diff';
            const diffPreview = fs.existsSync(diffPath)
              ? fs.readFileSync(diffPath, 'utf8').split('\n').slice(0, 120).join('\n')
              : '';
            const body = [
              'The scheduled TypeScript parity drift harness detected fixture changes.',
              '',
              `Run: ${runUrl}`,
              `Reference repo: \`${process.env.TS_REFERENCE_REPO}\``,
              `Reference ref: \`${process.env.TS_PARITY_TRACKING_REF}\``,
              '',
              'Local commands:',
              '',
              '```bash',
              'make ts-parity-update',
              'make ts-parity-drift',
              '```',
              '',
              'Agent brief is uploaded as the `ts-parity-drift` workflow artifact.',
              '',
              diffPreview ? 'Diff preview:' : '',
              diffPreview ? '```diff' : '',
              diffPreview,
              diffPreview ? '```' : '',
            ].filter(Boolean).join('\n');

            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`,
              per_page: 1,
            });

            if (search.data.items.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: search.data.items[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['pkg:ai', 'pkg:agent'],
              });
            }

      - name: Fail on drift
        if: steps.parity.outcome == 'failure'
        run: exit 1
