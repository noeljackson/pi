name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release -p pi-cli

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/pi dist/pi-linux-x64
          tar -C dist -czf dist/pi-linux-x64.tar.gz pi-linux-x64

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes "Release ${RELEASE_TAG}" \
            dist/pi-linux-x64.tar.gz \
            2>/dev/null || \
          gh release upload "${RELEASE_TAG}" dist/pi-linux-x64.tar.gz --clobber
